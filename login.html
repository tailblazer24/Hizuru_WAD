<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hizuru Admin | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Floating Widget Style */
        .status-widget {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            color: #483D8B;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.7) !important;
            animation: slideUp 0.8s ease-out;
        }

        .login-card h3 {
            color: #734F96;
            letter-spacing: 2px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(200, 162, 200, 0.3);
            border-radius: 10px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 10px rgba(204, 204, 255, 0.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="card login-card shadow-lg">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Hizuru<span class="text-warning">.</span></h3>
            </div>
            
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold" style="color: #734F96;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" id="username" class="form-control border-start-0" placeholder="admin" required>
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold" style="color: #734F96;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control border-start-0" placeholder="••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow">Login</button>
            </form>
            
            <div id="loginError" class="alert alert-danger mt-3 d-none small text-center">
                Unauthorized Credentials.
            </div>
        </div>
    </div>

    <script>

        // Login Logic
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "admin" && pass === "1234") {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = "index.html";
            } else {
                document.getElementById('loginError').classList.remove('d-none');
            }
        };
    </script>
</body>
</html>
